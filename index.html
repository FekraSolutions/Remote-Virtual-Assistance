<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fekra Business Solutions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        #introVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* THE FIX: 'fill' stops the zoom/crop and forces edge-to-edge */
            object-fit: fill; 
            z-index: 1;
        }

        .label-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 20px;
        }

        .label {
            padding: 15px 30px;
            border: 2px solid #fff;
            color: #fff;
            background: rgba(0,0,0,0.6);
            cursor: pointer;
            font-size: 1.5rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .label:hover {
            background: #fff;
            color: #000;
        }

        @media (max-width: 600px) {
            .label-container { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <video id="introVideo" autoplay muted playsinline loop>
        <source src="media/intro.mp4" type="video/mp4">
    </video>

    <div class="label-container">
        <div class="label" onclick="location.href='ar/index.html'">العربية</div>
        <div class="label" onclick="location.href='en/index.html'">English</div>
        <div class="label" onclick="location.href='fr/index.html'">Français</div>
    </div>

</body>
</html>
