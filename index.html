<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fekra Business Solutions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* THE VIDEO FIX */
        #introVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Edge-to-edge without stretching */
            z-index: -1;       /* Keep it behind buttons */
        }

        .label-container {
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .label {
            padding: 15px 30px;
            border: 2px solid white;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            font-size: 1.5rem;
        }

        @media (max-width: 600px) {
            .label-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <video id="introVideo" autoplay muted playsinline loop>
        <source src="media/intro.mp4" type="video/mp4">
    </video>

    <div class="label-container">
        <div class="label" onclick="location.href='ar/index.html'">العربية</div>
        <div class="label" onclick="location.href='en/index.html'">English</div>
        <div class="label" onclick="location.href='fr/index.html'">Français</div>
    </div>

</body>
</html>
