<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fekra Business Solutions | Select Language</title>
    
    <link rel="alternate" hreflang="en" href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/en/" />
    <link rel="alternate" hreflang="ar" href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/ar/" />
    <link rel="alternate" hreflang="fr" href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/fr/" />
    <link rel="alternate" hreflang="x-default" href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/en/" />

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="media/Tlogo.png">
    
    <style>
        /* Force the container to be exactly the screen size */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
        }

        /* THE FIX: Fixed position with viewport units and object-fit cover */
        #introVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Change to 'fill' if you want zero cropping, but it might stretch the faces */
            z-index: -1;
        }

        .logo-container {
            position: absolute; 
            top: 20px; 
            left: 20px;
            z-index: 10;
        }

        .logo-container img {
            height: 45px;
            width: auto;
        }

        .label-container {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: row;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .label {
            font-size: 20px;
            min-width: 140px;
            padding: 12px 25px;
            border: 1px solid;
            border-image: linear-gradient(45deg, #C0C0C0, #ffffff, #C0C0C0) 1;
            cursor: pointer;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .label:hover {
            background-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .label-container {
                flex-direction: column;
                gap: 15px;
            }
            .label {
                width: 180px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="media/Tlogo.png" alt="Fekra Logo">
    </div>

    <video id="introVideo" autoplay muted playsinline loop>
        <source src="media/intro.mp4" type="video/mp4">
    </video>

    <div class="label-container">
        <div class="label" onclick="location.href='ar/index.html'">العربية</div>
        <div class="label" onclick="location.href='en/index.html'">English</div>
        <div class="label" onclick="location.href='fr/index.html'">Français</div>
    </div>

</body>
</html>
