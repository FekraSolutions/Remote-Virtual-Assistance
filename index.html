    speed="1"
    autoplay
    loop>
</dotlottie-wc>

<script>

const translations = {
    en: {
        apps: "Applications",
        learn: "Learn",
        services: "Our Services",
        affiliate: "Affiliate Program",
        blog: "BLOG",
        about: "About us",
        contact: "Contact us",
        robotHello: "Hello from Fekra! 🤖"
    },

    ar: {
        apps: "التطبيقات",
        learn: "تعلم",
        services: "خدماتنا",
        affiliate: "برنامج الشركاء",
        blog: "المدونة",
        about: "من نحن",
        contact: "تواصل معنا",
        robotHello: "مرحبا من فكرة! 🤖"
    },

    fr: {
        apps: "Applications",
        learn: "Apprendre",
        services: "Nos services",
        affiliate: "Programme d'affiliation",
        blog: "Blog",
        about: "À propos",
        contact: "Contactez-nous",
        robotHello: "Bonjour de Fekra! 🤖"
    }
};

const languageSelect = document.getElementById("languageSelect");

function setLanguage(lang) {
    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        el.textContent = translations[lang][key] || key;
    });
}

languageSelect.addEventListener("change", () => {
    setLanguage(languageSelect.value);
});

setLanguage("en");

document.getElementById('robot').addEventListener('click', function() {
    const lang = languageSelect.value;
    alert(translations[lang].robotHello);
});

</script>
