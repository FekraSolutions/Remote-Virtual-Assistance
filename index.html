<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fekra Business Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. Reset everything to ensure no gaps */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            overflow: hidden; /* No scrollbars */
            background-color: #000;
        }

        /* 2. THE VIDEO FIX: This forces it to sit behind everything and fill the screen */
        #introVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100; /* Moves it to the absolute bottom layer */
            transform: translate(-50%, -50%); /* Keeps it perfectly centered */
            object-fit: cover;
        }

        /* 3. Positioning the content on top */
        .content-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .logo-container {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .logo-container img {
            height: 40px;
        }

        .label-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .label {
            font-size: 24px;
            padding: 12px 30px;
            border: 1px solid #fff;
            border-image: linear-gradient(45deg, #C0C0C0, #ffffff, #C0C0C0) 1;
            cursor: pointer;
            color: white;
            background: rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: 0.3s;
        }

        .label:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px #fff;
        }

        @media (max-width: 600px) {
            .label-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="media/Tlogo.png" alt="Logo">
    </div>

    <video id="introVideo" autoplay muted playsinline loop>
        <source src="media/intro.mp4" type="video/mp4">
    </video>

    <div class="content-overlay">
        <div class="label-container">
            <div class="label" onclick="location.href='ar/index.html'">العربية</div>
            <div class="label" onclick="location.href='en/index.html'">English</div>
            <div class="label" onclick="location.href='fr/index.html'">Français</div>
        </div>
    </div>

</body>
</html>
