<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Excel Beginner to Advanced Course</title>
  <link rel="icon" href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/media/Tlogo.png" />
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --muted: rgba(255,255,255,0.75);
      --glass: rgba(255,255,255,0.04);
      --accent: linear-gradient(135deg,#00c853,#009624);
      --accent-2: linear-gradient(135deg,#0066ff,#003ecb);
      --radius: 14px;
      --glass-border: rgba(255,255,255,0.06);
      --maxw: 1200px;
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
      font-family: "Cairo", system-ui, -apple-system, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; padding:0;}
    body{
      background: radial-gradient(1200px 600px at 10% 10%, rgba(0,120,255,0.05), transparent 8%),
                  linear-gradient(180deg,#071027 0%, #071824 50%, #071027 100%),
                  url('https://fekrasolutions.github.io/Remote-Virtual-Assistance/media/clinicback.webp');
      background-size: cover;
      color:var(--muted);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height: 100vh;
      padding: 20px;
    }

    .wrap{
      width:100%;
      max-width:var(--maxw);
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    /* Header */
    header.brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      width: 100%;
    }
    .brand-left{display:flex;align-items:center;gap:12px}
    .logo{
      width:54px;height:54px;border-radius:12px;overflow:hidden;
      border:1px solid var(--glass-border);
      background:rgba(255,255,255,0.02);
    }
    .logo img{width:100%;height:100%;object-fit:cover}
    h1.app-title{font-size:22px;margin:0;color:#fff;}

    .lang-select select{
      background-color: #0b1220;
      border:1px solid var(--glass-border);
      color:#fff;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
    }

    /* Main Pricing Area */
    .aside{
      background: rgba(255,255,255,0.02);
      border-radius: var(--radius);
      padding:30px;
      border:1px solid var(--glass-border);
      box-shadow: var(--shadow);
    }

    .price-head { margin-bottom: 25px; text-align: center; }
    .price-head h3 { font-size: 28px; color: #fff; margin: 0 0 10px 0; }

    /* THE FIX: SIDE BY SIDE CARDS */
    .cards{
      display: flex;
      flex-direction: row; /* Horizontal */
      gap: 20px;
      justify-content: center;
      align-items: stretch;
      width: 100%;
    }

    .card{
      flex: 1; /* Equal widths */
      background: rgba(255,255,255,0.03);
      border-radius:12px;
      padding:24px;
      border: 1px solid rgba(255,255,255,0.05);
      display:flex;
      flex-direction:column;
      transition: transform 0.2s;
    }
    .card:hover{ transform: translateY(-5px); background: rgba(255,255,255,0.05); }

    .price{ margin: 15px 0; }
    .amount{ font-size: 32px; color: #fff; font-weight: 800; }
    .dur{ font-size: 14px; opacity: 0.8; }

    .features-list{
      margin: 20px 0;
      flex-grow: 1; /* Pushes button to bottom */
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .fitem{ display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .fitem svg{ width: 16px; height: 16px; flex-shrink: 0; }

    .btn{
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      transition: opacity 0.2s;
    }
    .btn:hover{ opacity: 0.9; }
    .btn-pay-month, .btn-pay-quarter{ background: var(--accent-2); }
    .btn-pay-year{ background: var(--accent); }

    footer.small{
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      opacity: 0.6;
    }
    footer.small a{ color: #fff; text-decoration: none; }

    /* Responsive */
    @media (max-width: 900px) {
      .cards { flex-direction: column; }
      body { height: auto; padding: 40px 20px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <header class="brand">
    <div class="brand-left">
      <div class="logo"><img src="https://fekrasolutions.github.io/Remote-Virtual-Assistance/media/clinic-preview.jpg" alt="Logo"></div>
      <div>
        <h1 class="app-title" id="appName">ClinicERP</h1>
        <p id="shortTag" style="margin:0; font-size:12px; opacity:0.7;"></p>
      </div>
    </div>
    <div class="lang-select">
      <select id="lang">
        <option value="ar">العربية</option>
        <option value="en" selected>English</option>
        <option value="fr">Français</option>
      </select>
    </div>
  </header>

  <main class="aside">
    <div class="price-head">
      <h3 id="plansTitle">Subscription Packs</h3>
      <div id="plansSub" class="price-sub"></div>
    </div>

    <div class="cards">
      <div class="card">
        <strong id="monthlyTitle">Monthly</strong>
        <div class="price">
          <span class="amount" id="monthlyAmount">$12</span>
          <span class="dur" id="monthlyDur"></span>
        </div>
        <div class="features-list" id="cardFeatures1"></div>
        <a href="#" class="btn btn-pay-month" id="payMonthly"><span id="payMonthText"></span></a>
      </div>

      <div class="card">
        <strong id="quarterlyTitle">Quarterly</strong>
        <div class="price">
          <span class="amount" id="quarterlyAmount">$30</span>
          <span class="dur" id="quarterlyDur"></span>
        </div>
        <div class="features-list" id="cardFeatures3"></div>
        <a href="#" class="btn btn-pay-quarter" id="payQuarterly"><span id="payQuarterText"></span></a>
      </div>

      <div class="card">
        <strong id="yearlyTitle">Yearly</strong>
        <div class="price">
          <span class="amount" id="yearlyAmount">$90</span>
          <span class="dur" id="yearlyDur"></span>
        </div>
        <div class="features-list" id="cardFeatures2"></div>
        <a href="#" class="btn btn-pay-year" id="payYearly"><span id="payYearText"></span></a>
      </div>
    </div>

    <div style="margin-top:25px; text-align:center; font-size:13px; opacity:0.6;">
      <strong id="secureTitle"></strong><br>
      <span id="secureText"></span>
    </div>
  </main>

  <footer class="small">
    <div>© <span id="year"></span> ClinicERP</div>
    <a href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/" id="moreLink" target="_blank">Learn more</a>
  </footer>
</div>

<script>
const LOCALES = {
  en: {
    appName: "ClinicERP",
    shortTag: "Reception • Invoices • Scheduling",
    plansTitle: "Subscription Packs",
    plansSub: "Choose the plan that fits your clinic needs.",
    monthly: "Monthly",
    monthlyDur: "/ month",
    payMonthText: "Pay $12 / Month",
    quarterly: "Quarterly",
    quarterlyDur: "/ 3 months",
    payQuarterText: "Pay $30 / 3 Months",
    yearly: "Yearly",
    yearlyDur: "/ year",
    payYearText: "Pay $90 / Year",
    secureTitle: "Secure Payments",
    secureText: "We accept PayPal. Receipts sent via email.",
    features: ["All features included", "24/7 Support", "Customizations available"],
    learnMore: "Learn more"
  },
  ar: {
    appName: "ClinicERP",
    shortTag: "الاستقبال • الفواتير • الجلسات",
    plansTitle: "خطط الاشتراك",
    plansSub: "اختر الخطة المناسبة لاحتياجات عيادتك.",
    monthly: "شهري",
    monthlyDur: "/ شهر",
    payMonthText: "دفع $12 / شهرياً",
    quarterly: "ربع سنوي",
    quarterlyDur: "/ 3 أشهر",
    payQuarterText: "دفع $30 / كل 3 أشهر",
    yearly: "سنوي",
    yearlyDur: "/ سنة",
    payYearText: "دفع $90 / سنوياً",
    secureTitle: "دفع آمن",
    secureText: "نقبل PayPal. يتم إرسال الإيصالات بريدياً.",
    features: ["جميع الميزات متضمنة", "دعم 24/7", "تخصيصات متاحة"],
    learnMore: "المزيد"
  },
  fr: {
    appName: "ClinicERP",
    shortTag: "Accueil • Factures • Planning",
    plansTitle: "Forfaits",
    plansSub: "Choisissez le forfait qui vous convient.",
    monthly: "Mensuel",
    monthlyDur: "/ mois",
    payMonthText: "Payer $12 / Mois",
    quarterly: "Trimestriel",
    quarterlyDur: "/ 3 mois",
    payQuarterText: "Payer $30 / 3 Mois",
    yearly: "Annuel",
    yearlyDur: "/ an",
    payYearText: "Payer $90 / An",
    secureTitle: "Paiement Sécurisé",
    secureText: "Nous acceptons PayPal.",
    features: ["Toutes fonctions", "Support 24/7", "Personnalisation"],
    learnMore: "En savoir plus"
  }
};

const els = {
  lang: document.getElementById('lang'),
  appName: document.getElementById('appName'),
  shortTag: document.getElementById('shortTag'),
  plansTitle: document.getElementById('plansTitle'),
  plansSub: document.getElementById('plansSub'),
  mTitle: document.getElementById('monthlyTitle'),
  mDur: document.getElementById('monthlyDur'),
  mPay: document.getElementById('payMonthText'),
  qTitle: document.getElementById('quarterlyTitle'),
  qDur: document.getElementById('quarterlyDur'),
  qPay: document.getElementById('payQuarterText'),
  yTitle: document.getElementById('yearlyTitle'),
  yDur: document.getElementById('yearlyDur'),
  yPay: document.getElementById('payYearText'),
  secT: document.getElementById('secureTitle'),
  secX: document.getElementById('secureText'),
  more: document.getElementById('moreLink'),
  feat1: document.getElementById('cardFeatures1'),
  feat2: document.getElementById('cardFeatures2'),
  feat3: document.getElementById('cardFeatures3'),
  payM: document.getElementById('payMonthly'),
  payQ: document.getElementById('payQuarterly'),
  payY: document.getElementById('payYearly')
};

function update(code){
  const L = LOCALES[code];
  document.documentElement.dir = code === 'ar' ? 'rtl' : 'ltr';
  els.appName.textContent = L.appName;
  els.shortTag.textContent = L.shortTag;
  els.plansTitle.textContent = L.plansTitle;
  els.plansSub.textContent = L.plansSub;
  els.mTitle.textContent = L.monthly;
  els.mDur.textContent = L.monthlyDur;
  els.mPay.textContent = L.payMonthText;
  els.qTitle.textContent = L.quarterly;
  els.qDur.textContent = L.quarterlyDur;
  els.qPay.textContent = L.payQuarterText;
  els.yTitle.textContent = L.yearly;
  els.yDur.textContent = L.yearlyDur;
  els.yPay.textContent = L.payYearText;
  els.secT.textContent = L.secureTitle;
  els.secX.textContent = L.secureText;
  els.more.textContent = L.learnMore;

  const check = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  [els.feat1, els.feat2, els.feat3].forEach(container => {
    container.innerHTML = L.features.map(f => `<div class="fitem">${check}<span>${f}</span></div>`).join('');
  });

  els.payM.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=fekrabusinesssolutions%40gmail.com&amount=12.00&currency_code=USD&item_name=${encodeURIComponent(L.appName + ' Monthly')}`;
  els.payQ.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=fekrabusinesssolutions%40gmail.com&amount=30.00&currency_code=USD&item_name=${encodeURIComponent(L.appName + ' Quarterly')}`;
  els.payY.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=fekrabusinesssolutions%40gmail.com&amount=90.00&currency_code=USD&item_name=${encodeURIComponent(L.appName + ' Yearly')}`;
}

els.lang.addEventListener('change', (e) => update(e.target.value));
document.getElementById('year').textContent = new Date().getFullYear();
update('en');
</script>

</body>
</html>
