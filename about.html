<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About us</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="Tlogo.png" href="media/Tlogo.png">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Cairo', sans-serif;
            flex-direction: column;
            background: url('media/back.webp') center center no-repeat;
            background-size: 100% 100%;
            position: relative;
            overflow: hidden;
        }

        .content-container {
            width: 80%;
            margin-top: 3%;  /* Set top margin separately */
            margin-left: auto;
            margin-right: auto;
            background: rgba(211, 211, 211, 0.8); /* Light grey, 80% transparent */
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            position: relative;
        }

        .content-text {
            max-height: 400px;
            overflow-y: auto;  /* Makes text scrollable if too much */
        }
    </style>
</head>
<body>

<div style="position: absolute; top: 10px; left: 10px;">
    <a href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/" target="_self">
        <img src="media/Tlogo.png" alt="Language" style="height: 40px; margin-left: 2px;">
    </a>

    <select id="languageSelect" style="margin-left: 10px; position: relative; top: -12px;">
        <option value="en">English</option>
        <option value="ar">العربية</option>
        <option value="fr">Français</option>
    </select>
</div>

<div class="content-container">
    <div class="content-text"></div>
</div>

<button data-i18n="mazentitle"
onclick="window.open('https://drive.google.com/file/d/1G0HLqyrUzrw2exYivXS6jRSmGvnrSTtu/view?usp=sharing', '_blank')" 
style="margin-top: 20px; padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
Mazen Abbas
</button>

<!-- Include marked.js library -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

const translations = {

    en: {
        mazentitle: "Mazen Abbas"
    },

    ar: {
        mazentitle: "مازن عباس"
    },

    fr: {
        mazentitle: "Mazen Abbas"
    }

};

const languageSelect = document.getElementById("languageSelect");

function loadMarkdown(lang){

    const fileMap = {
        en: "media/about_en.md",
        ar: "media/about_ar.md",
        fr: "media/about_fr.md"
    };

    fetch(fileMap[lang])
        .then(response => response.text())
        .then(data => {
            document.querySelector('.content-text').innerHTML = marked.parse(data);
        })
        .catch(error => console.error('Error loading the Markdown:', error));
}

function setLanguage(lang){

    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";

    document.querySelectorAll("[data-i18n]").forEach(el=>{
        const key = el.getAttribute("data-i18n");
        el.textContent = translations[lang][key] || key;
    });

    loadMarkdown(lang);
}

languageSelect.addEventListener("change", ()=>{
    setLanguage(languageSelect.value);
});

setLanguage("en");

</script>

</body>
</html>
