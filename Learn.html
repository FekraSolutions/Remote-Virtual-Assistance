<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Fekra! Learn - Business, Excel & Web Tutorials</title>

    <!-- SEO Description -->
    <meta name="description" content="Fekra! Learn offers expert tutorials in Accounting, Office apps, Google Apps Script, SEO writing, and Web Development. Learn practical skills and join our courses for full guidance.">

    <!-- Keywords -->
    <meta name="keywords" content="Fekra Learn, accounting tutorials, Excel tutorials, Office apps, Google Apps Script, web development lessons, SEO writing, business tutorials, online courses, learn Excel, learn web development">

    <!-- Open Graph -->
    <meta property="og:title" content="Fekra! Learn - Tutorials & Courses">
    <meta property="og:description" content="Explore tutorials in Accounting, Office tools, Google Apps Script, SEO, and Web Development. Join Fekra courses for hands-on learning and practical skills.">
    <meta property="og:image" content="https://fekrasolutions.github.io/Remote-Virtual-Assistance/media/Tlogo.png">
    <meta property="og:url" content="https://fekrasolutions.github.io/Remote-Virtual-Assistance/Learn.html">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Fekra! Learn - Tutorials & Courses">
    <meta name="twitter:description" content="Learn Accounting, Excel, Google Apps Script, SEO writing, and Web Development with Fekra! Join our courses for full guidance and hands-on practice.">
    <meta name="twitter:image" content="https://fekrasolutions.github.io/Remote-Virtual-Assistance/media/Tlogo.png">

    <!-- SEO Extras -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="Fekra Business Solutions">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="media/Tlogo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Cairo', sans-serif;
            flex-direction: column;
            background: url('media/back.webp') center center no-repeat;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            width: 100%;
        }

        #languageSelect {
            font-size: 16px;
            padding: 5px;
            background-color: transparent;
            color: white;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            border: 1px solid;
            border-image: linear-gradient(45deg, #d4af37, #f8f8ff, #d4af37) 1;
            border-radius: 5px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        #languageSelect option { color: black; }

        /* ===============================
           COURSE GALAXY
        =============================== */
        .course-galaxy {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            width: 90%;
            max-width: 1200px;
            margin-top: 60px;
        }

        .course-card {
            display: flex;
            flex-direction: column;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(255,255,255,0.15);
            background-color: #111;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
        }

        /* Top image row */
        .course-image {
            flex: 2;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 150px;
        }

        /* Bottom text row */
        .course-text {
            flex: 1;
            background-color: rgba(0,0,0,0.75);
            color: white;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .course-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .course-desc {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Mobile polish */
        @media (max-width: 600px) {
            .course-galaxy {
                grid-template-columns: 1fr;
            }
            .course-image { min-height: 180px; }
        }

    </style>
</head>

<body>

    <!-- Top Bar -->
    <div style="position: absolute; top: 10px; left: 10px; display:flex; align-items:center; z-index: 100;">
        <a href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/" target="_self">
            <img src="media/Tlogo.png" alt="Logo" style="height: 40px; margin-left: 2px;">
        </a>
        <select id="languageSelect" style="margin-left: 10px;">
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <!-- COURSE GALAXY -->
    <div class="course-galaxy">
<a href="courses/learnaccounting.html" style="text-decoration: none;">
    <div class="course-card accounting">
        <div class="course-image" style="background-image: url('media/learnaccounting.jpg');"></div>
        <div class="course-text">
            <div class="course-title" data-i18n="course_accounting">Accounting & Finance</div>
            <div class="course-desc" data-i18n="desc_accounting">Understand money. Control decisions.</div>
        </div>
    </div>
</a>

        <div class="course-card office">
            <div class="course-image" style="background-image: url('media/learnoffice.jpg');"></div>
            <div class="course-text">
                <div class="course-title" data-i18n="course_office">MS Office & VBA</div>
                <div class="course-desc" data-i18n="desc_office">Automate work. Eliminate repetition.</div>
            </div>
        </div>

        <div class="course-card google">
            <div class="course-image" style="background-image: url('media/learngoogle.jpg');"></div>
            <div class="course-text">
                <div class="course-title" data-i18n="course_google">Google Apps & Scripts</div>
                <div class="course-desc" data-i18n="desc_google">Build cloud tools without limits.</div>
            </div>
        </div>

        <div class="course-card seo">
            <div class="course-image" style="background-image: url('media/leranwriting.jpg');"></div>
            <div class="course-text">
                <div class="course-title" data-i18n="course_seo">SEO Writing</div>
                <div class="course-desc" data-i18n="desc_seo">Write for humans. Rank for algorithms.</div>
            </div>
        </div>

        <div class="course-card web">
            <div class="course-image" style="background-image: url('media/learnwebsite.jpg');"></div>
            <div class="course-text">
                <div class="course-title" data-i18n="course_web">Website Development</div>
                <div class="course-desc" data-i18n="desc_web">Design. Build. Launch digital worlds.</div>
            </div>
        </div>
    </div>


    <script>
        const translations = {
            en: {
                welcome: "Welcome to Fekra! Learn",
                robotHello: "Hello from Fekra! 🤖",
                course_accounting: "Accounting & Finance",
                desc_accounting: "Understand money. Control decisions.",
                course_office: "MS Office & VBA",
                desc_office: "Automate work. Eliminate repetition.",
                course_google: "Google Apps & Scripts",
                desc_google: "Build cloud tools without limits.",
                course_seo: "SEO Writing",
                desc_seo: "Write for humans. Rank for algorithms.",
                course_web: "Website Development",
                desc_web: "Design. Build. Launch digital worlds."
            },
            ar: {
                welcome: "تعلم مع فكرة",
                robotHello: "أهلًا من فِكرة! 🤖",
                course_accounting: "المحاسبة والتمويل",
                desc_accounting: "افهم المال وتحكم في القرار.",
                course_office: "مايكروسوفت أوفيس و VBA",
                desc_office: "أتمتة العمل والقضاء على التكرار.",
                course_google: "تطبيقات جوجل والسكربت",
                desc_google: "بناء أدوات سحابية بلا حدود.",
                course_seo: "الكتابة لمحركات البحث",
                desc_seo: "اكتب للإنسان وتصدر النتائج.",
                course_web: "تطوير المواقع",
                desc_web: "صمم وابنِ وأطلق عوالم رقمية."
            },
            fr: {
                welcome: "Bienvenue sur Fekra! Learn",
                robotHello: "Bonjour de Fekra! 🤖",
                course_accounting: "Comptabilité & Finance",
                desc_accounting: "Comprendre l'argent et décider.",
                course_office: "MS Office & VBA",
                desc_office: "Automatiser et gagner du temps.",
                course_google: "Google Apps & Scripts",
                desc_google: "Créer des outils cloud puissants.",
                course_seo: "Rédaction SEO",
                desc_seo: "Écrire pour l'humain et l’algorithme.",
                course_web: "Développement Web",
                desc_web: "Concevoir et lancer le web."
            }
        };

        const languageSelect = document.getElementById("languageSelect");

        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                el.textContent = translations[lang][key] || key;
            });
        }

        languageSelect.addEventListener("change", () => {
            setLanguage(languageSelect.value);
        });

        setLanguage("en");

        document.getElementById("robot").addEventListener("click", () => {
            const lang = languageSelect.value;
            alert(translations[lang].robotHello);
        });
    </script>

</body>
</html>
