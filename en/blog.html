<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOG - Fekra! Business Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="media/Tlogo.png">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Cairo', sans-serif;
            flex-direction: column;
            background: url('media/back.webp') center center no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            width: 100%;
            overflow: auto;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 600px;
            margin-top: 5vh;
        }

        .blog-subcontainer {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .blog-item {
            display: flex;
            align-items: center;
        }

        .blog-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 15px;
        }

        .blog-item .blog-text {
            font-size: 16px;
            color: #333;
        }
    </style>
</head>

<body>

<!-- Logo + Language -->
<div style="position: absolute; top: 10px; left: 10px;">
    <a href="https://fekrasolutions.github.io/Remote-Virtual-Assistance/" target="_self">
        <img src="media/Tlogo.png" alt="Language" style="height: 40px; margin-left: 2px;">
    </a>

    <select id="languageSelect" style="margin-left: 10px; position: relative; top: -12px;">
        <option value="en">English</option>
        <option value="ar">العربية</option>
        <option value="fr">Français</option>
    </select>
</div>

<!-- Blog list -->
<div class="container">

    <div class="blog-subcontainer" onclick="window.open('blogs/202020.html', '_blank')">
        <div class="blog-item">
            <img src="media/منبه مجاني.png" alt="Blog Thumbnail">
            <div class="blog-text" data-i18n="blog1">Eyerelax - 202020 - Free Web Alarm</div>
        </div>
    </div>

    <div class="blog-subcontainer" onclick="window.open('blogs/ClinicERP.html', '_blank')">
        <div class="blog-item">
            <img src="media/clinic-preview.jpg" alt="Blog Thumbnail">
            <div class="blog-text" data-i18n="blog2">ClinicERP Updates & Features</div>
        </div>
    </div>

</div>

<!-- Robot character -->
<script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.6.2/dist/dotlottie-wc.js" type="module"></script>

<dotlottie-wc id="robot"
    src="https://lottie.host/566498bf-85ea-4ce3-90ab-fe13e94f08cb/Ddxa0WVDVS.lottie"
    style="width: 72px; height: 72px; position: fixed; bottom: 20px; right: 20px; z-index: 9999; cursor: pointer;"
    speed="1"
    autoplay
    loop>
</dotlottie-wc>

<script>

const translations = {

    en: {
        blog1: "Eyerelax - 202020 - Free Web Alarm",
        blog2: "ClinicERP Updates & Features",
        robotHello: "Hello from Fekra! 🤖"
    },

    ar: {
        blog1: "إراحة العين - منبه 20-20-20 مجاني",
        blog2: "تحديثات ومميزات نظام العيادات",
        robotHello: "مرحبا من فكرة! 🤖"
    },

    fr: {
        blog1: "EyeRelax - Alarme Web Gratuit 20-20-20",
        blog2: "Mises à jour et fonctionnalités de ClinicERP",
        robotHello: "Bonjour de Fekra! 🤖"
    }

};

const languageSelect = document.getElementById("languageSelect");

function setLanguage(lang){

    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";

    document.querySelectorAll("[data-i18n]").forEach(el=>{
        const key = el.getAttribute("data-i18n");
        el.textContent = translations[lang][key] || key;
    });

}

languageSelect.addEventListener("change", ()=>{
    setLanguage(languageSelect.value);
});

setLanguage("en");

document.getElementById('robot').addEventListener('click', ()=>{
    const lang = languageSelect.value;
    alert(translations[lang].robotHello);
});

</script>

</body>
</html>
